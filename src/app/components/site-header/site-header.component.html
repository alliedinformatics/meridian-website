<header class="site-header">
  <div class="container site-header-inner">
    <a class="brand-mark" routerLink="/">
      <img src="images/logo_icon.png" alt="Meridian Software Solutions" />
      <span>
        <strong>{{ brand.shortName }}</strong>
        <small>{{ brand.tagline }}</small>
      </span>
    </a>

    <nav class="desktop-nav" aria-label="Primary navigation">
      @for (link of links; track link.path) {
        <a
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: link.path === '/' }"
          [routerLink]="link.path"
        >
          {{ link.label }}
        </a>
      }
    </nav>

    <div class="header-actions">
      <a class="button header-cta" routerLink="/contact">Contact Us</a>
      <button class="nav-toggle" type="button" (click)="toggleMobile()" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  @if (mobileOpen()) {
    <nav class="mobile-nav" aria-label="Mobile navigation">
      @for (link of links; track link.path) {
        <a
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: link.path === '/' }"
          [routerLink]="link.path"
          (click)="mobileOpen.set(false)"
        >
          {{ link.label }}
        </a>
      }
      <a class="button mobile-cta" routerLink="/contact" (click)="mobileOpen.set(false)">Contact Us</a>
    </nav>
  }
</header>
